name: CalmNAV Notify

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # Primary and fallback slots for 09:00 Australia/Sydney across AEST and AEDT.
    - cron: "7 22 * * *"
    - cron: "22 22 * * *"
    - cron: "7 23 * * *"
    - cron: "22 23 * * *"
    # Primary and fallback slots for 21:00 Australia/Sydney across AEST and AEDT.
    - cron: "7 10 * * *"
    - cron: "22 10 * * *"
    - cron: "7 11 * * *"
    - cron: "22 11 * * *"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run CalmNAV notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ALERT_TIMEZONE: Australia/Sydney
          ALERT_TIMES: 09:00,21:00
          ALERT_WINDOW_MINUTES: 30
          MANUAL_BTC_HOLDINGS: ${{ secrets.MANUAL_BTC_HOLDINGS }}
          MANUAL_TOTAL_COST_USD: ${{ secrets.MANUAL_TOTAL_COST_USD }}
          MANUAL_SHARES_OUTSTANDING: ${{ secrets.MANUAL_SHARES_OUTSTANDING }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python -m calmnav.main --send-discord --scheduled-run
          else
            python -m calmnav.main --send-discord
          fi
